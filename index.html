<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Yafet Rissy & Partners Law Firm</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f4ee;
      --text: #111111;
      --muted: #5f625c;
      --line: rgba(17, 17, 17, 0.08);
      --max: 1160px;
      --pad: 16px;
    }

    @media (min-width: 300px) {
      :root {
        --pad: 18px;
      }
    }

    @media (min-width: 400px) {
      :root {
        --pad: 22px;
      }
    }

    @media (min-width: 576px) {
      :root {
        --pad: 28px;
      }
    }

    @media (min-width: 768px) {
      :root {
        --pad: 36px;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100svh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    .container {
      width: 100%;
      padding-inline: var(--pad);
      margin-inline: auto;
    }

    header,
    footer {
      flex: 0 0 auto;
    }

    .site-header {
      padding-block: 18px;
      border-bottom: 1px solid var(--line);
    }

    .nav {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      font-size: 22px;
      font-weight: 850;
      line-height: 1;
      letter-spacing: -0.045em;
      z-index: 2;
    }

    .menu-toggle {
      width: 38px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      z-index: 2;
    }

    .menu-toggle span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--text);
      transition: transform 180ms ease;
    }

    .menu-toggle.is-active span:first-child {
      transform: translateY(4.5px) rotate(45deg);
    }

    .menu-toggle.is-active span:last-child {
      transform: translateY(-4.5px) rotate(-45deg);
    }

    .nav-links {
      display: none;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 13px;
      font-weight: 600;
      text-transform: lowercase;
    }

    .nav-links.is-open {
      position: absolute;
      top: calc(100% + 18px);
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px;
      background: var(--bg);
      border: 1px solid var(--line);
      font-size: 18px;
      z-index: 10;
    }

    main {
      flex: 1 1 auto;
      display: grid;
      align-items: center;
    }

    .hero {
      width: 100%;
      padding-block: clamp(44px, 10svh, 68px);
    }

    .hero h1 {
      margin: 0;
      max-width: 980px;
      font-size: 48px;
      line-height: 0.92;
      letter-spacing: -0.048em;
      font-weight: 900;
    }

    .hero h3 {
      margin: 36px 0 0;
      max-width: 680px;
      font-size: clamp(20px, 2vw, 34px);
      line-height: 1.15;
      letter-spacing: -0.03em;
      font-weight: 500;
      color: var(--muted);
    }

    @media (max-width: 360px) {
      .hero {
        padding-block: 40px;
      }

      .hero h3 {
        margin-top: 28px;
      }
    }

    @media (min-width: 576px) and (max-width: 768px) {
      .hero {
        padding-block: 64px;
      }
    }

    .site-footer {
      padding-block: 18px;
      border-top: 1px solid var(--line);
    }

    .footer-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 18px;
    }

    .footer-note {
      font-size: 12px;
      color: var(--muted);
    }

    .footer-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 13px;
      font-weight: 600;
      text-transform: lowercase;
    }

    @media (max-width: 768px) {
      .hero h1 {
        max-width: 100%;
      }
    }

    @media (min-width: 576px) {
      .brand {
        font-size: 24px;
      }

      .hero h1 {
        font-size: 64px;
      }

      .footer-inner {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
    }

    @media (min-width: 768px) {
      .brand {
        font-size: 26px;
      }

      .hero h1 {
        font-size: 84px;
      }

      .footer-links {
        gap: 22px;
        font-size: 14px;
      }
    }

    @media (min-width: 769px) {
      .site-header {
        padding-block: 26px;
      }

      .menu-toggle {
        display: none;
      }

      .nav-links {
        display: flex;
        gap: 22px;
        font-size: 14px;
      }
    }

    @media (min-width: 992px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .container {
        max-width: var(--max);
      }

      .brand {
        font-size: 28px;
      }

      .nav-links,
      .footer-links {
        font-size: 15px;
      }

      .hero h1 {
        font-size: 108px;
      }
    }

    @media (min-width: 1200px) {
      :root {
        --max: 1120px;
      }

      .site-header {
        padding-block: 30px;
      }

      .brand {
        font-size: 30px;
      }

      .hero h1 {
        font-size: 132px;
      }
    }

    @media (min-width: 1400px) {
      :root {
        --max: 1240px;
      }

      .brand {
        font-size: 32px;
      }

      .nav-links,
      .footer-links {
        font-size: 16px;
      }

      .hero h1 {
        font-size: 156px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="#">YR&amp;P</a>

        <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">
          <span></span>
          <span></span>
        </button>

        <nav class="nav-links" aria-label="Main navigation">
          <a href="#">law services</a>
          <a href="#">compliance</a>
          <a href="#">our team</a>
          <a href="#">foreign lawyers</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Yafet Rissy &amp; Partners Law Firm</h1>
          <h3>Our clients are at the center of everything we do</h3>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-note">Indonesia-focused legal services.</div>

        <nav class="footer-links" aria-label="Footer navigation">
          <a href="#">privacy</a>
          <a href="#">legal</a>
          <a href="#">contact</a>
        </nav>
      </div>
    </footer>
  </div>

  <script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    menuToggle.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('is-open');

      menuToggle.classList.toggle('is-active', isOpen);
      menuToggle.setAttribute('aria-expanded', String(isOpen));
      menuToggle.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
    });
  </script>
</body>
</html>
